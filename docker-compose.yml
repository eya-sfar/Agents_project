version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: university_obs_db
    environment:
      POSTGRES_DB: university_obs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: project
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations/init_schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: university_obs_api
    command: python run_api.py
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

  dashboard:
    build: .
    container_name: university_obs_dashboard
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api

volumes:
  pgdata: